<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Readable.ai CRM — Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:linear-gradient(135deg,#0f1f3d 0%,#1d4ed8 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:white; border-radius:18px; padding:38px 36px 32px; width:400px; box-shadow:0 24px 80px rgba(0,0,0,.35); }
.logo-row { text-align:center; margin-bottom:28px; }
.logo-badge { display:inline-block; background:#0f1f3d; color:white; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; padding:4px 10px; border-radius:5px; margin-bottom:10px; }
.logo-title { font-size:22px; font-weight:800; color:#0f1f3d; }
.logo-sub { font-size:12.5px; color:#64748b; margin-top:3px; }
.fg { margin-bottom:15px; }
.flbl { display:block; font-size:11.5px; font-weight:700; color:#475569; margin-bottom:5px; text-transform:uppercase; letter-spacing:.4px; }
.fc { width:100%; padding:10px 13px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:13.5px; color:#1e293b; outline:none; transition:border .15s; }
.fc:focus { border-color:#1d4ed8; box-shadow:0 0 0 3px rgba(29,78,216,.1); }
.btn { width:100%; padding:11px; background:#1d4ed8; color:white; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px; transition:background .15s; }
.btn:hover { background:#1e40af; }
.btn:disabled { background:#94a3b8; cursor:not-allowed; }
.err { background:#fee2e2; color:#991b1b; border-radius:7px; padding:10px 12px; font-size:12.5px; margin-top:12px; display:none; }
.foot { text-align:center; margin-top:22px; font-size:11px; color:#94a3b8; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-badge">RevAvenues · BU1</div>
    <div class="logo-title">Readable.ai CRM</div>
    <div class="logo-sub">Sales Command Center — Secure Login</div>
  </div>
  <div class="fg">
    <label class="flbl">Username</label>
    <input class="fc" id="username" type="text" placeholder="Enter your username" autocomplete="username">
  </div>
  <div class="fg">
    <label class="flbl">Password</label>
    <input class="fc" id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="login()">Sign In →</button>
  <div class="err" id="errMsg"></div>
  <div class="foot">RevAvenues · revavenues.in · Powered by Claude</div>
</div>

<script>
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');
  err.style.display = 'none';
  if (!username || !password) { showErr('Please enter username and password.'); return; }
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Login failed'); btn.disabled=false; btn.textContent='Sign In →'; return; }
    // Redirect based on role
    window.location.href = data.user.role === 'admin' ? '/admin.html' : '/bdr.html';
  } catch(e) {
    showErr('Server error — make sure the CRM server is running.');
    btn.disabled=false; btn.textContent='Sign In →';
  }
}
function showErr(msg) {
  const e = document.getElementById('errMsg');
  e.textContent = msg;
  e.style.display = 'block';
}

// If already logged in, redirect
fetch('/api/me').then(r => r.json()).then(d => {
  if (d.role) window.location.href = d.role === 'admin' ? '/admin.html' : '/bdr.html';
}).catch(()=>{});
</script>
</body>
</html>
